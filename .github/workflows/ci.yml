name: CI

on:
    pull_request:
    push:
        branches:
            - master
        tags:
            - 'v*.*.*'
    repository_dispatch:
        types: [protocol-updated]

permissions:
    contents: read
    id-token: write

jobs:
    ci:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup NodeJS
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  registry-url: https://registry.npmjs.org

            - name: Installing Dependencies
              run: npm i

            - name: Lint
              run: npm run lint

            - name: Build
              run: npm run build

            - name: Run Legacy Tests (Mocha)
              run: npm run test
              continue-on-error: true

            - name: Run TypeScript Tests (Vitest)
              run: npm run test:vitest

    publish:
        runs-on: ubuntu-latest
        needs: ci
        if: startsWith(github.ref, 'refs/tags/')
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup NodeJS
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  registry-url: https://registry.npmjs.org

            - name: Installing Dependencies
              run: npm i

            - name: Build
              run: npm run build

            - name: Publish NPM
              run: |
                  unset NODE_AUTH_TOKEN
                  npm publish --provenance
